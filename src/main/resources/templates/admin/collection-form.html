<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(${collection == null ? 'Thêm Bộ sưu tập' : 'Chỉnh sửa Bộ sưu tập'}, ~{::content}, 'collections')}" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <header class="flex justify-between items-center px-12 py-8 bg-surface">
        <div>
            <h2 class="text-4xl font-black tracking-tighter uppercase font-serif" th:text="${collection == null ? 'THÊM BỘ SƯU TẬP' : 'SỬA BỘ SƯU TẬP'}">FORM</h2>
            <p class="text-xs font-medium tracking-widest text-on-surface-variant uppercase mt-2">Xây dựng nhóm sản phẩm theo chủ đề</p>
        </div>
        <a href="/admin/collections" class="text-xs font-bold tracking-[0.2em] text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">arrow_back</span> QUAY LẠI DANH SÁCH
        </a>
    </header>

    <main class="px-12 pb-32">
        <form th:action="${collection == null ? '/admin/collections/add' : '/admin/collections/edit/' + collection.id}" 
              method="post" enctype="multipart/form-data" class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-7 space-y-12">
                <section>
                    <h3 class="text-xs font-bold tracking-[0.3em] text-primary uppercase border-b border-outline-variant pb-4 mb-8">Thông tin cơ bản</h3>
                    <div class="space-y-8">
                        <div class="group">
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-primary transition-colors">Tên bộ sưu tập</label>
                            <input type="text" name="name" th:value="${collection != null ? collection.name : ''}" required
                                   class="w-full bg-transparent border-b border-outline-variant py-3 focus:border-primary focus:ring-0 text-sm transition-all duration-300 outline-none"
                                   placeholder="VÍ DỤ: ARCHIVE 2024 - MÙA HÈ">
                        </div>

                        <div class="group">
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-primary transition-colors">Mô tả bộ sưu tập</label>
                            <textarea name="description" rows="4" th:text="${collection != null ? collection.description : ''}"
                                      class="w-full bg-transparent border border-outline-variant p-4 focus:border-primary focus:ring-0 text-sm transition-all duration-300 outline-none resize-none"
                                      placeholder="Mô tả tinh thần và ý tưởng của bộ sưu tập này..."></textarea>
                        </div>

                        <div class="group">
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-4 transition-colors group-focus-within:text-primary">
                                Hình Ảnh Đại Diện (Banner)
                            </label>
                            <div class="relative border border-dashed border-outline-variant hover:border-primary transition-all duration-500 p-12 text-center group/upload cursor-pointer bg-surface-container-lowest"
                                 onclick="document.getElementById('fileInput').click()">
                                <input type="file" id="fileInput" name="file" class="hidden" onchange="previewImage(this)">
                                <div class="space-y-4">
                                    <span class="material-symbols-outlined text-4xl text-outline-variant group-hover/upload:text-secondary transition-colors duration-500">add_a_photo</span>
                                    <p class="text-[10px] font-bold tracking-[0.2em] uppercase">Nhấn để chọn ảnh</p>
                                </div>
                            </div>
                            <div th:if="${collection != null && collection.imageUrl != null}" class="mt-4">
                                <img th:src="'https://lh3.googleusercontent.com/d/' + ${collection.imageUrl}" class="w-40 h-24 object-cover border border-outline-variant/30">
                            </div>
                            <div id="imagePreview" class="mt-4"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-5 space-y-12">
                <section class="bg-surface-container-low p-10 border border-outline-variant/10">
                    <h3 class="text-xs font-bold tracking-[0.3em] text-primary uppercase border-b border-outline-variant pb-4 mb-8">Sản phẩm thuộc nhóm</h3>
                    
                    <div class="space-y-4 max-h-[500px] overflow-y-auto pr-4 no-scrollbar">
                        <div th:each="p : ${products}" class="flex items-center gap-4 p-3 bg-surface hover:bg-surface-container transition-colors border border-outline-variant/5">
                            <input type="checkbox" name="productIds" th:value="${p.idSanPham}" 
                                   th:checked="${collection != null && collection.productIds != null && collection.productIds.contains(p.idSanPham)}"
                                   class="w-4 h-4 text-primary border-outline-variant/50 focus:ring-primary">
                            <div class="w-12 h-14 overflow-hidden bg-surface-container flex-shrink-0">
                                <img th:src="${p.hinhAnh != null && !p.hinhAnh.isEmpty() ? 'https://lh3.googleusercontent.com/d/' + p.hinhAnh : 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=100'}" class="w-full h-full object-cover grayscale group-hover:grayscale-0">
                            </div>
                            <div class="min-w-0">
                                <p class="text-[10px] font-bold text-primary uppercase truncate" th:text="${p.tenSanPham}">Sản phẩm</p>
                                <p class="text-[8px] text-on-surface-variant uppercase tracking-widest mt-1" th:text="${p.category != null ? p.category.tenDanhMuc : 'Essentials'}">Danh mục</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-outline-variant/20">
                        <button type="submit"
                                class="w-full bg-primary text-white py-5 text-xs font-bold tracking-[0.3em] uppercase hover:bg-secondary transition-all duration-500 shadow-2xl hover:shadow-primary/20">
                            LƯU BỘ SƯU TẬP
                        </button>
                    </div>
                </section>
            </div>
        </form>
    </main>

    <script>
        function previewImage(input) {
            const container = document.getElementById('imagePreview');
            container.innerHTML = '';
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'w-40 h-24 object-cover border border-outline-variant/30';
                    container.appendChild(img);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</div>
</body>
</html>
