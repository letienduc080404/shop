<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('CÀI ĐẶT HỆ THỐNG', ~{::content}, 'settings')}" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content" class="p-12">
    <!-- Top Navigation Context -->
    <header class="flex justify-between items-baseline mb-16">
        <div>
            <h2 class="text-4xl font-serif font-bold tracking-tight text-primary">CÀI ĐẶT HỆ THỐNG</h2>
            <p class="text-xs font-label uppercase tracking-widest text-on-primary-container mt-2">Cấu hình & Phân quyền quản trị</p>
        </div>
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] font-bold tracking-widest uppercase">Admin User</p>
                    <p class="text-[9px] text-secondary tracking-tighter uppercase">Super Admin</p>
                </div>
                <div class="w-10 h-10 bg-surface-container-high flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary" data-icon="person">person</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Settings Content -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- Sidebar Navigation for Settings -->
        <div class="lg:col-span-1 space-y-2">
            <button class="w-full text-left px-6 py-4 bg-primary text-white text-[11px] font-bold tracking-widest uppercase transition-colors">THÔNG TIN CHUNG</button>
            <button class="w-full text-left px-6 py-4 bg-surface-container-lowest border border-outline-variant/20 text-on-primary-container text-[11px] font-bold tracking-widest uppercase hover:bg-surface-container-high transition-colors">CẤU HÌNH GIAO HÀNG</button>
            <button class="w-full text-left px-6 py-4 bg-surface-container-lowest border border-outline-variant/20 text-on-primary-container text-[11px] font-bold tracking-widest uppercase hover:bg-surface-container-high transition-colors">KẾT NỐI API (DRIVE)</button>
            <button class="w-full text-left px-6 py-4 bg-surface-container-lowest border border-outline-variant/20 text-on-primary-container text-[11px] font-bold tracking-widest uppercase hover:bg-surface-container-high transition-colors">BẢO MẬT & MẬT KHẨU</button>
        </div>

        <!-- Main Settings Form -->
        <div class="lg:col-span-2 bg-surface-container-lowest p-10 shadow-sm border border-outline-variant/10">
            <h3 class="font-serif text-2xl font-bold mb-8">Thông Tin Cửa Hàng</h3>
            
            <form action="#" method="post" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-on-primary-container mb-2">Tên thương hiệu</label>
                        <input type="text" value="DOMINO" class="w-full border-b border-outline-variant/50 bg-transparent py-2 focus:ring-0 focus:border-secondary outline-none text-sm transition-colors"/>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold tracking-widest uppercase text-on-primary-container mb-2">Email liên hệ</label>
                        <input type="email" value="admin@domino.vn" class="w-full border-b border-outline-variant/50 bg-transparent py-2 focus:ring-0 focus:border-secondary outline-none text-sm transition-colors"/>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold tracking-widest uppercase text-on-primary-container mb-2">Địa chỉ trụ sở</label>
                    <input type="text" value="97 Man Thiện, Phường Tăng Nhơn Phú, TP. Hồ Chí Minh" class="w-full border-b border-outline-variant/50 bg-transparent py-2 focus:ring-0 focus:border-secondary outline-none text-sm transition-colors"/>
                </div>

                <div>
                    <label class="block text-[10px] font-bold tracking-widest uppercase text-on-primary-container mb-2">Số điện thoại Hotline</label>
                    <input type="text" value="+84 90 123 4567" class="w-full border-b border-outline-variant/50 bg-transparent py-2 focus:ring-0 focus:border-secondary outline-none text-sm transition-colors"/>
                </div>

                <div class="pt-8 flex gap-4">
                    <button type="button" class="bg-primary text-white px-10 py-4 text-[11px] font-black tracking-widest uppercase hover:bg-secondary transition-all">LƯU THAY ĐỔI</button>
                    <button type="button" class="bg-transparent border border-outline-variant/50 text-primary px-10 py-4 text-[11px] font-black tracking-widest uppercase hover:bg-surface-container transition-all">HỦY BỎ</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
