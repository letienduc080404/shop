<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('Thêm Sản Phẩm Mới', ~{::content}, 'inventory')}" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <header class="flex justify-between items-center px-12 py-8 bg-surface">
        <div>
            <h2 class="text-4xl font-black tracking-tighter uppercase font-serif">Thêm Sản Phẩm</h2>
            <p class="text-xs font-medium tracking-widest text-on-surface-variant uppercase mt-2">Khởi tạo sản phẩm & Editorial variants</p>
        </div>
        <a href="/admin/products" class="text-xs font-bold tracking-[0.2em] text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">arrow_back</span> QUAY LẠI DANH SÁCH
        </a>
    </header>

    <main class="px-12 pb-32">
        <form th:action="@{/admin/product/add}" method="post" enctype="multipart/form-data" class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            <!-- Left Column: Basic Info -->
            <div class="lg:col-span-7 space-y-12">
                <section>
                    <h3 class="text-xs font-bold tracking-[0.3em] text-primary uppercase border-b border-outline-variant pb-4 mb-8">Thông tin cơ bản</h3>
                    <div class="space-y-8">
                        <div class="group">
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-primary transition-colors">Tên Sản Phẩm</label>
                            <input type="text" name="tenSanPham" required
                                   class="w-full bg-transparent border-b border-outline-variant py-3 focus:border-primary focus:ring-0 text-sm transition-all duration-300 outline-none"
                                   placeholder="VÍ DỤ: ÁO SƠ MI LỤA CAO CẤP">
                        </div>

                        <div class="grid grid-cols-2 gap-8">
                            <div class="group">
                                <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-primary transition-colors">Danh Mục</label>
                                <select name="idDanhMuc" required
                                        class="w-full bg-transparent border-b border-outline-variant py-3 focus:border-primary focus:ring-0 text-sm transition-all duration-300 outline-none appearance-none cursor-pointer">
                                    <option th:each="cat : ${categories}" th:value="${cat.idDanhMuc}" th:text="${cat.tenDanhMuc}">CATEGORY</option>
                                </select>
                            </div>
                            <div class="group">
                                <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-primary transition-colors">Giá Niêm Yết (VND)</label>
                                <input type="number" name="giaNiemYet" required
                                       class="w-full bg-transparent border-b border-outline-variant py-3 focus:border-primary focus:ring-0 text-sm transition-all duration-300 outline-none"
                                       placeholder="2500000">
                            </div>
                        </div>

                        <div class="group">
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-4 transition-colors group-focus-within:text-primary">
                                Hình Ảnh Sản Phẩm
                            </label>
                            
                            <!-- Custom Upload Zone -->
                            <div class="relative border border-dashed border-outline-variant hover:border-primary transition-all duration-500 p-12 text-center group/upload cursor-pointer bg-surface-container-lowest"
                                 onclick="document.getElementById('fileInput').click()">
                                
                                <input type="file" id="fileInput" name="files" multiple required class="hidden" onchange="previewImages(this)">
                                
                                <div class="space-y-4">
                                    <span class="material-symbols-outlined text-4xl text-outline-variant group-hover/upload:text-secondary transition-colors duration-500">
                                        add_a_photo
                                    </span>
                                    <div class="space-y-1">
                                        <p class="text-[10px] font-bold tracking-[0.2em] uppercase">Nhấn để tải ảnh lên</p>
                                        <p class="text-[9px] text-on-surface-variant tracking-[0.2em] uppercase opacity-40">Hỗ trợ JPG, PNG, WEBP</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Preview Container -->
                            <div id="imagePreview" class="mt-6 grid grid-cols-4 gap-4">
                                <!-- Previews will be injected here -->
                            </div>
                        </div>

                        <script>
                            function previewImages(input) {
                                const container = document.getElementById('imagePreview');
                                container.innerHTML = '';
                                if (input.files) {
                                    Array.from(input.files).forEach(file => {
                                        const reader = new FileReader();
                                        reader.onload = function(e) {
                                            const div = document.createElement('div');
                                            div.className = 'aspect-[3/4] bg-surface-container overflow-hidden border border-outline-variant/10';
                                            div.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                                            container.appendChild(div);
                                        }
                                        reader.readAsDataURL(file);
                                    });
                                }
                            }
                        </script>

                        <div class="group">
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-primary transition-colors">Mô Tả Sản Phẩm</label>
                            <textarea name="moTa" rows="4" required
                                      class="w-full bg-transparent border border-outline-variant p-4 focus:border-primary focus:ring-0 text-sm transition-all duration-300 outline-none resize-none"
                                      placeholder="Mô tả chi tiết về chất liệu, thiết kế..."></textarea>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right Column: Variants -->
            <div class="lg:col-span-5 space-y-12">
                <section class="bg-surface-container-low p-10 border border-outline-variant/10">
                    <h3 class="text-xs font-bold tracking-[0.3em] text-primary uppercase border-b border-outline-variant pb-4 mb-8">Biến thể & Phân loại</h3>
                    
                    <div class="space-y-8">
                        <div>
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-4">Chọn Kích Cỡ</label>
                            <div class="grid grid-cols-3 gap-2">
                                <label th:each="size : ${kichThuocs}" class="relative group cursor-pointer">
                                    <input type="checkbox" name="sizes" th:value="${size}" class="peer sr-only">
                                    <div class="border border-outline-variant/30 py-3 text-center text-[10px] font-bold hover:border-primary transition-colors uppercase peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary"
                                         th:text="${size}">S</div>
                                </label>
                            </div>
                        </div>

                        <div class="group">
                            <label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-primary transition-colors">Màu Sắc (Cách nhau bằng dấu phẩy)</label>
                            <input type="text" name="mauSacs" required
                                   class="w-full bg-transparent border-b border-outline-variant py-3 focus:border-primary focus:ring-0 text-sm transition-all duration-300 outline-none"
                                   placeholder="Trắng, Đen, Xanh Rêu">
                        </div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-outline-variant/20">
                        <button type="submit"
                                class="w-full bg-primary text-white py-5 text-xs font-bold tracking-[0.3em] uppercase hover:bg-secondary transition-all duration-500 shadow-2xl hover:shadow-primary/20">
                            XÁC NHẬN TẠO SẢN PHẨM
                        </button>
                        <p class="text-[9px] text-center text-on-surface-variant tracking-widest mt-4 uppercase opacity-60">Sản phẩm sẽ có sẵn trên website ngay sau khi tạo</p>
                    </div>
                </section>
            </div>
        </form>
    </main>
</div>
</body>
</html>
