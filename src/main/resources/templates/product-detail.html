<!DOCTYPE html>
<html class="light" lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('CHI TIẾT SẢN PHẨM')}"></head>

<body class="bg-surface text-on-surface selection:bg-secondary selection:text-white">
    <header th:replace="~{fragments/layout :: header}"></header>

    <main class="pt-24 pb-20">
        <section class="max-w-[1440px] mx-auto px-6 md:px-12 lg:grid lg:grid-cols-12 gap-12 items-start" th:if="${product != null}">
            <div class="lg:col-span-7 space-y-6">
                <!-- Main Image -->
                <div class="aspect-[4/5] bg-surface-container overflow-hidden group">
                    <img id="mainImage" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" 
                         th:src="${product.getImageUrl()}" />
                </div>
                
                <!-- Thumbnails Gallery -->
                <div th:if="${product.images != null && !product.images.isEmpty()}" 
                     class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                    <div th:each="img : ${product.images}" 
                         class="flex-shrink-0 w-24 aspect-[4/5] bg-surface-container cursor-pointer border-2 border-transparent hover:border-secondary transition-all"
                         th:onclick="'document.getElementById(\'mainImage\').src = \'' + @{${img.duongDan}} + '\''">
                        <img class="w-full h-full object-cover" th:src="@{${img.duongDan}}" />
                    </div>
                </div>
            </div>
            <div class="lg:col-span-5 pt-8 lg:pt-0 lg:sticky lg:top-32 h-fit">
                <div class="space-y-8">
                    <div>
                        <p class="font-label text-xs tracking-[0.2em] text-secondary font-bold mb-4 uppercase" 
                           th:text="${product.category != null ? product.category.tenDanhMuc : 'Essentials'}">Sưu tập Thu Đông '24</p>
                        <h1 class="text-5xl font-headline font-black text-primary leading-tight mb-2 tracking-tighter uppercase" 
                            th:text="${product.tenSanPham}">TÊN SẢN PHẨM</h1>
                        <div th:if="${product.giaKhuyenMai != null and product.giaKhuyenMai.compareTo(product.giaNiemYet) < 0}" class="flex items-center gap-3">
                            <p class="text-lg text-outline line-through font-light"
                               th:text="${#numbers.formatDecimal(product.giaNiemYet, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">0 VNĐ</p>
                            <p class="text-2xl text-secondary font-bold"
                               th:text="${#numbers.formatDecimal(product.giaKhuyenMai, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">0 VNĐ</p>
                        </div>
                        <p th:if="${product.giaKhuyenMai == null or product.giaKhuyenMai.compareTo(product.giaNiemYet) >= 0}" class="text-2xl text-primary/60 font-light" 
                           th:text="${product.giaNiemYet != null ? #numbers.formatDecimal(product.giaNiemYet, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">0 VNĐ</p>
                    </div>

                    <div class="space-y-6 pt-6 border-t border-outline-variant/20">
                        <p class="text-on-surface-variant leading-relaxed text-sm" th:text="${product.moTa}">
                            Mô tả sản phẩm...
                        </p>
                        
                        <!-- Variant Selectors -->
                        <div class="space-y-6">
                            <!-- Color Selection -->
                            <div class="space-y-3" th:if="${rawVariants != null && !rawVariants.isEmpty()}">
                                <span class="text-[10px] font-bold tracking-[0.25em] text-on-surface-variant uppercase">MÀU SẮC</span>
                                <div class="flex flex-wrap gap-3">
                                    <button th:each="v : ${rawVariants}"
                                            th:if="${vStat.first || v.mauSac != rawVariants[vStat.index-1].mauSac}"
                                            type="button"
                                            th:text="${v.mauSac}"
                                            th:data-color="${v.mauSac}"
                                            onclick="selectColor(this)"
                                            class="color-btn px-6 py-2 border border-outline-variant text-[10px] font-bold tracking-widest uppercase hover:border-primary transition-all">
                                        MÀU
                                    </button>
                                </div>
                            </div>

                            <!-- Size Selection -->
                            <div class="space-y-3" th:if="${rawVariants != null && !rawVariants.isEmpty()}">
                                <span class="text-[10px] font-bold tracking-[0.25em] text-on-surface-variant uppercase">KÍCH THƯỚC</span>
                                <div class="flex flex-wrap gap-3">
                                    <button th:each="sizeValue : ${T(com.example.shop.entity.enums.KichThuoc).values()}"
                                            type="button"
                                            th:text="${sizeValue}"
                                            th:data-size="${sizeValue}"
                                            onclick="selectSize(this)"
                                            class="size-btn px-6 py-2 border border-outline-variant text-[10px] font-bold tracking-widest uppercase hover:border-primary transition-all">
                                        SIZE
                                    </button>
                                </div>
                            </div>

                            <!-- Stock Status -->
                            <div id="stockStatus" class="font-label text-[10px] font-bold tracking-widest uppercase h-4 flex items-center"></div>
                        </div>

                        <div class="flex flex-col gap-4 pt-4">
                            <form th:action="@{/cart/add}" method="post" id="addToCartForm">
                                <input type="hidden" name="productId" th:value="${product.idSanPham}" />
                                <input type="hidden" name="variantId" id="selectedVariantId" value="" />
                                <input type="hidden" name="soLuong" value="1" />
                                
                                <button type="submit" id="addToCartBtn" disabled
                                    class="w-full bg-primary text-white py-5 px-8 font-label text-xs tracking-widest uppercase font-bold hover:bg-primary-container transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                    THÊM VÀO GIỎ HÀNG
                                </button>
                                <p id="selectionWarning" class="text-[10px] text-red-500 font-bold tracking-widest uppercase mt-4 text-center">
                                    VUI LÒNG CHỌN MÀU VÀ SIZE
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Product Variants Data (for JS) -->
        <script th:inline="javascript">
            /*<![CDATA[*/
            const variants = /*[[${variants}]]*/ []; 
            /*]]>*/

            let selectedColor = null;
            let selectedSize = null;

            function normalizeVietnamese(str) {
                if (!str) return "";
                return str.normalize("NFC").trim().toLowerCase();
            }

            function selectColor(btn) {
                selectedColor = btn.getAttribute('data-color');
                document.querySelectorAll('.color-btn').forEach(b => {
                    b.style.backgroundColor = "transparent";
                    b.style.color = "inherit";
                    b.style.borderColor = "";
                });
                btn.style.backgroundColor = "#000";
                btn.style.color = "#fff";
                btn.style.borderColor = "#000";
                updateSelection();
            }

            function selectSize(btn) {
                selectedSize = btn.getAttribute('data-size');
                document.querySelectorAll('.size-btn').forEach(b => {
                    b.style.backgroundColor = "transparent";
                    b.style.color = "inherit";
                    b.style.borderColor = "";
                });
                btn.style.backgroundColor = "#000";
                btn.style.color = "#fff";
                btn.style.borderColor = "#000";
                updateSelection();
            }

            function updateSelection() {
                const stockDisplay = document.getElementById('stockStatus');
                const variantIdInput = document.getElementById('selectedVariantId');
                const addBtn = document.getElementById('addToCartBtn');
                const warning = document.getElementById('selectionWarning');

                if (selectedColor && selectedSize) {
                    const normColor = normalizeVietnamese(selectedColor);
                    const normSize = normalizeVietnamese(selectedSize);

                    const match = variants.find(v => 
                        normalizeVietnamese(v.color) === normColor && 
                        normalizeVietnamese(v.size) === normSize
                    );
                    
                    if (match) {
                        variantIdInput.value = match.id;
                        if (match.stock > 0) {
                            stockDisplay.innerHTML = `<span class="inline-block w-2 h-2 bg-green-500 rounded-full mr-2"></span>CÒN HÀNG: ${match.stock} SẢN PHẨM`;
                            stockDisplay.style.color = "#2E7D32";
                            addBtn.disabled = false;
                            addBtn.style.opacity = "1";
                            warning.classList.add('hidden');
                        } else {
                            stockDisplay.innerHTML = `<span class="inline-block w-2 h-2 bg-red-500 rounded-full mr-2"></span>HẾT HÀNG`;
                            stockDisplay.style.color = "#D32F2F";
                            addBtn.disabled = true;
                            addBtn.style.opacity = "0.5";
                            warning.innerText = 'SẢN PHẨM HIỆN ĐANG HẾT HÀNG';
                            warning.classList.remove('hidden');
                        }
                    } else {
                        variantIdInput.value = "";
                        stockDisplay.innerHTML = `<span class="inline-block w-2 h-2 bg-gray-400 rounded-full mr-2"></span>KHÔNG CÓ SẴN TỔ HỢP NÀY`;
                        stockDisplay.style.color = "#666";
                        addBtn.disabled = true;
                        addBtn.style.opacity = "0.5";
                        warning.innerText = 'KHÔNG TÌM THẤY SIZE NÀY CHO MÀU ĐÃ CHỌN';
                        warning.classList.remove('hidden');
                    }
                }
            }
        </script>
        
        <!-- Hoàn thiện phong cách Section -->
        <section class="mt-32 pt-24 pb-32 bg-[#F5F5F5]">
            <div class="max-w-[1440px] mx-auto px-6 md:px-12 text-center">
                <h2 class="text-4xl font-headline font-black tracking-tight uppercase mb-2">HOÀN THIỆN PHONG CÁCH</h2>
                <p class="text-xs tracking-[0.2em] text-outline uppercase mb-16">Gợi ý các phụ kiện và trang phục phối cùng hoàn hảo</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-16 text-left">
                    <article th:each="rec : ${recommendations}" class="group">
                        <a th:href="@{/product/{id}(id=${rec.idSanPham})}" class="block">
                            <div class="aspect-[3/4] overflow-hidden bg-white mb-6 relative">
                                <img th:src="${rec.getImageUrl()}" alt="Recommendation image"
                                     class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                            </div>
                            <h3 class="font-headline font-bold text-sm tracking-tight mb-2 uppercase" th:text="${rec.tenSanPham}">SƠ MI OXFORD TRẮNG</h3>
                            <p class="text-xs text-outline mb-1" 
                               th:text="${rec.category != null ? rec.category.tenDanhMuc : 'Essentials'}">CATEGORY</p>
                            <p class="text-sm font-medium" th:if="${rec.giaKhuyenMai != null and rec.giaKhuyenMai.compareTo(rec.giaNiemYet) < 0}">
                                <span class="line-through text-outline mr-2"
                                      th:text="${#numbers.formatDecimal(rec.giaNiemYet, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">850,000 VNĐ</span>
                                <span class="text-secondary"
                                      th:text="${#numbers.formatDecimal(rec.giaKhuyenMai, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">650,000 VNĐ</span>
                            </p>
                            <p class="text-sm font-medium" th:if="${rec.giaKhuyenMai == null or rec.giaKhuyenMai.compareTo(rec.giaNiemYet) >= 0}"
                               th:text="${rec.giaNiemYet != null ? #numbers.formatDecimal(rec.giaNiemYet, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}">850,000 VNĐ</p>
                        </a>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <!-- Standardized Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script>
        (function() {
            function normalizeNode(node) {
                if (node.nodeType === 3) {
                    if (node.nodeValue) node.nodeValue = node.nodeValue.normalize('NFC');
                } else if (node.nodeType === 1) {
                    for (let i = 0; i < node.childNodes.length; i++) {
                        normalizeNode(node.childNodes[i]);
                    }
                }
            }
            document.addEventListener('DOMContentLoaded', () => normalizeNode(document.body));
        })();
    </script>
</body>
</html>
