<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | DOMINO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1c1c1c',
                        secondary: '#b71507',
                        outline: '#1c1c1c/50',
                        'outline-variant': '#1c1c1c/10',
                        surface: '#fbf9f8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-surface font-sans text-primary m-0 p-0 selection:bg-secondary selection:text-white">
    <main class="min-h-screen flex items-center justify-center px-6 py-12">
        <div class="max-w-md w-full space-y-12">
            <div class="text-center">
                <a href="/" class="inline-block">
                    <h1 class="text-5xl font-headline font-black tracking-tighter uppercase mb-2">DOMINO</h1>
                </a>
                <p class="text-xs tracking-[0.4em] uppercase text-outline/60">The Aura Shop Experience</p>
            </div>

            <div class="bg-white p-10 shadow-2xl space-y-8">
                <div class="space-y-2">
                    <h2 class="text-2xl font-headline font-black tracking-tight uppercase">Đăng nhập</h2>
                    <p class="text-xs text-outline italic">Chào mừng bạn trở lại với không gian tối giản của chúng tôi.</p>
                </div>

                <div th:if="${param.error}" class="bg-secondary/5 border border-secondary/20 p-4">
                    <p class="text-secondary text-xs font-medium uppercase tracking-widest">Email hoặc mật khẩu không chính xác.</p>
                </div>

                <div th:if="${param.registered}" class="bg-green-50 border border-green-200 p-4">
                    <p class="text-green-700 text-xs font-medium uppercase tracking-widest">Đăng ký thành công! Vui lòng đăng nhập.</p>
                </div>

                <form th:action="@{/login}" method="post" class="space-y-6">
                    <div class="space-y-1">
                        <label for="email" class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline">Địa chỉ Email</label>
                        <input type="email" id="email" name="email" required
                               class="w-full bg-surface border-b border-outline-variant py-3 px-0 focus:border-primary transition-colors outline-none text-sm placeholder:text-outline/20 font-medium"
                               placeholder="your@email.com">
                    </div>

                    <div class="space-y-1">
                        <label for="password" class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline">Mật khẩu</label>
                        <input type="password" id="password" name="password" required
                               class="w-full bg-surface border-b border-outline-variant py-3 px-0 focus:border-primary transition-colors outline-none text-sm placeholder:text-outline/20 font-medium"
                               placeholder="••••••••">
                    </div>

                    <div class="pt-4">
                        <button type="submit" 
                                class="w-full bg-primary text-white py-5 font-bold uppercase tracking-[0.3em] text-xs hover:bg-secondary transition-all duration-500 shadow-lg hover:shadow-secondary/20 group relative overflow-hidden">
                            <span class="relative z-10">Tiến vào không gian</span>
                        </button>
                    </div>
                </form>

                <div class="text-center pt-4">
                    <p class="text-xs text-outline">Chưa có tài khoản? 
                        <a href="/register" class="text-primary font-bold hover:text-secondary hover:underline underline-offset-4 transition-all">Gia nhập cộng đồng</a>
                    </p>
                </div>
            </div>
            
            <div class="text-center text-[10px] text-outline/40 uppercase tracking-[0.5em] pt-8">
                &copy; 2024 DOMINO STUDIO
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        (function() {
            function normalizeNode(node) {
                if (node.nodeType === 3) {
                    if (node.nodeValue) node.nodeValue = node.nodeValue.normalize('NFC');
                } else if (node.nodeType === 1) {
                    for (let i = 0; i < node.childNodes.length; i++) {
                        normalizeNode(node.childNodes[i]);
                    }
                }
            }
            document.addEventListener('DOMContentLoaded', () => normalizeNode(document.body));
        })();
    </script>
</body>
</html>
